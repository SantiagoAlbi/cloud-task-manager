apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: task-manager-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /tasks
        pathType: Prefix
        backend:
          service:
            name: task-backend-service
            port:
              number: 5000
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: task-backend-service
            port:
              number: 5000
      - path: /grafana
        pathType: Prefix
        backend:
          service:
            name: prometheus-grafana
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: task-frontend-service
            port:
              number: 80
